- id: 'eco_home_climate_120'
  alias: Eco Home Risparmio Energetico Clima
  description: Spegne i condizionatori se le finestre restano aperte per più di 3 minuti
  mode: single
  triggers:
  - trigger: state
    entity_id:
    - binary_sensor.finestra_sala
    - binary_sensor.finestra_camera
    to: 'on'
    for: 00:03:00
  conditions:
  - condition: or
    conditions:
    - condition: state
      entity_id: climate.condizionatore_sala
      state: 'cool'
    - condition: state
      entity_id: climate.condizionatore_sala
      state: 'heat'
    - condition: state
      entity_id: climate.condizionatore_camera
      state: 'cool'
    - condition: state
      entity_id: climate.condizionatore_camera
      state: 'heat'
  actions:
  - action: climate.turn_off
    target:
      entity_id:
      - climate.condizionatore_sala
      - climate.condizionatore_camera
    continue_on_error: true
  - action: notify.notify
    data:
      title: "Risparmio Energetico"
      message: "Attenzione, stai disperdendo calore/fresco! Ho spento i condizionatori perché la finestra è aperta da più di 3 minuti."
    continue_on_error: true
