- id: '1783777716603'
  alias: Eco Home - Azioni Notifiche
  mode: parallel
  description: Eco Home v1.1.8 - Automazione dedicata per gestire le risposte interattive alle notifiche push (es. accensione condizionatori) in parallelo, evitando i ritardi della coda TTS.
  triggers:
  - trigger: event
    event_type: mobile_app_notification_action
  conditions:
  - condition: template
    value_template: >
      {{ trigger.event.data.action | string | startswith('TURN_ON_AC_') }}
  - condition: template
    value_template: >
      {{ is_state('input_boolean.eco_home_attivo', 'on') }}
  - condition: template
    value_template: >
      {% set temp_sensors = indoor_temp_sensors %}
      {% set valid_sensors = temp_sensors | select('has_value') | list %}
      {% if valid_sensors | length > 0 %}
        {% set avg_temp = valid_sensors | map('states') | map('float', -99) | select('>', -50) | list | average | float(-99) %}
        {{ avg_temp > 26.0 }}
      {% else %}
        false
      {% endif %}
  actions:
  - action: climate.turn_on
    target:
      entity_id: '{{ ac_climate_entities }}'
  - action: climate.set_hvac_mode
    target:
      entity_id: '{{ ac_climate_entities }}'
    data:
      hvac_mode: cool
  - action: input_text.set_value
    target:
      entity_id: input_text.eco_home_ultimo_esito
    data:
      value: Condizionatori accesi da notifica
    continue_on_error: true
  - if:
    - condition: template
      value_template: '{{ debug }}'
    then:
    - action: logbook.log
      data:
        name: Eco Home
        message: Condizionatori accesi da notifica interattiva.
  variables:
    debug: true
    # Copia qui le stesse variabili usate in eco-home-v1.1.8.yaml
    indoor_temp_sensors:
    - sensor.temperatura_sala
    - sensor.temperatura_camera
    ac_climate_entities:
    - climate.condizionatore_sala
    - climate.condizionatore_camera
